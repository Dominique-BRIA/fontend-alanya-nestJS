workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60

    environment:
      flutter: 3.24.5   # Version stable fixe — évite les surprises des mises à jour auto
      java: 17

    scripts:
      - name: Get dependencies
        script: |
          flutter pub get

      - name: Build APK release
        script: |
          flutter build apk --release \
            --dart-define=API_URL=https://backend-alanya.vercel.app \
            --dart-define=WS_URL=wss://alanya-ws.onrender.com

    artifacts:
      # Utiliser l'astérisque (*) garantit que Codemagic attrapera l'APK, 
      # peu importe s'il s'appelle app-release.apk ou app.apk
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - d.bria00@gmail.com   # N'oublie pas de remplacer par ton vrai email !
        notify:
          success: true
          failure: true

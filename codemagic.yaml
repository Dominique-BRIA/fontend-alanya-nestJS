workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60

    environment:
      flutter: 3.24.5   # Version stable fixe
      java: 17

    scripts:
      - name: Get dependencies
        script: |
          flutter pub get

      - name: Patch Plugins SDK & AAR Metadata Overrides
        script: |
          echo "=== Modification des plugins dans le pub cache ==="
          
          # Force compileSdkVersion 36 dans les fichiers build.gradle (Groovy) des plugins tiers
          find $PUB_CACHE -name "build.gradle" -exec sed -i '' 's/compileSdkVersion .*/compileSdkVersion 36/g' {} + 2>/dev/null || \
          find $PUB_CACHE -name "build.gradle" -exec sed -i 's/compileSdkVersion .*/compileSdkVersion 36/g' {} +
          
          # Force compileSdk/compileSdkVersion dans les fichiers build.gradle.kts (Kotlin) des plugins tiers
          find $PUB_CACHE -name "build.gradle.kts" -exec sed -i '' 's/compileSdk = .*/compileSdk = 36/g' {} + 2>/dev/null || \
          find $PUB_CACHE -name "build.gradle.kts" -exec sed -i 's/compileSdk = .*/compileSdk = 36/g' {} +
          find $PUB_CACHE -name "build.gradle.kts" -exec sed -i '' 's/compileSdkVersion = .*/compileSdkVersion = 36/g' {} + 2>/dev/null || \
          find $PUB_CACHE -name "build.gradle.kts" -exec sed -i 's/compileSdkVersion = .*/compileSdkVersion = 36/g' {} +

          echo "=== Alignement et Bypass AAR sur l'application principale ==="
          # S'assure que ton app-même utilise bien compileSdk = 36
          sed -i '' 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle.kts 2>/dev/null || \
          sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle.kts
          
          # Force l'application à ignorer la vérification stricte d'AGP pour les dépendances androidx (AAR Metadata)
          echo -e "\ntasks.withType<com.android.build.gradle.internal.tasks.CheckAarMetadataTask>().configureEach { enabled = false }" >> android/app/build.gradle.kts

      - name: Build APK release
        script: |
          flutter build apk --release \
            --dart-define=API_URL=https://backend-alanya.vercel.app \
            --dart-define=WS_URL=wss://alanya-ws.onrender.com

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - d.bria00@gmail.com
        notify:
          success: true
          failure: true

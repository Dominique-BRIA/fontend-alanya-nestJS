workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60

    environment:
      flutter: 3.24.5
      java: 17

    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get

      - name: Patch plugins compileSdk to 36
        script: |
          # Codemagic tourne sur macOS — sed -i requiert '' sur macOS, pas sur Linux
          # Cette syntaxe fonctionne sur les deux :
          find $PUB_CACHE -name "build.gradle" | while read f; do
            sed -i.bak 's/compileSdkVersion [0-9]*/compileSdkVersion 36/g' "$f"
          done
          find $PUB_CACHE -name "build.gradle.kts" | while read f; do
            sed -i.bak 's/compileSdk = [0-9]*/compileSdk = 36/g' "$f"
            sed -i.bak 's/compileSdkVersion([0-9]*)/compileSdkVersion(36)/g' "$f"
          done
          echo "Patch done. Checking file_picker:"
          grep -r "compileSdk" $PUB_CACHE/hosted/pub.dev/file_picker*/android/build.gradle 2>/dev/null || true

      - name: Build APK release
        script: |
          flutter build apk --release \
            --dart-define=API_URL=https://backend-alanya.vercel.app \
            --dart-define=WS_URL=wss://alanya-ws.onrender.com

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - dominiquebria09@gmail.com
        notify:
          success: true
          failure: true
